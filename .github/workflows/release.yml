name: Release
permissions: {}

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

defaults:
  run:
    shell: bash

env:
  CI: true
  FORCE_COLOR: true

jobs:
  release:
    name: Release
    if: ${{ github.repository_owner == 'ArmandPhilippot' }}
    permissions:
      contents: write # to create release (changesets/action)
      id-token: write
      pull-requests: write # to create pull request (changesets/action)
    timeout-minutes: 20
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install pnpm
        uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4.2.0

      - name: Install Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 24.14.0
          package-manager-cache: false

      - name: Install dependencies
        run: pnpm i

      - name: Create Release Pull Request
        uses: changesets/action@6a0a831ff30acef54f2c6aa1cbbc1096b066edaf # v1.7.0
        with:
          version: pnpm ci:version
          commit: "chore: new release"
          title: "chore: new release candidate"
          publish: pnpm ci:release
        env:
          # Needs access to push to main
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if coldark-vscode was published
        id: vscode-published
        if: steps.changesets.outputs.published == 'true'
        run: |
          if echo '${{ steps.changesets.outputs.publishedPackages }}' | jq -e '.[] | select(.name == "coldark-vscode")' > /dev/null; then
            echo "published=true" >> $GITHUB_OUTPUT
          else
            echo "published=false" >> $GITHUB_OUTPUT
          fi

      - name: Publish to VSCode Marketplace
        if: steps.vscode-published.outputs.published == 'true'
        working-directory: ./packages/coldark-vscode
        run: |
          pnpm dlx @vscode/vsce publish --no-dependencies -p ${{ secrets.VSCE_TOKEN }}

      - name: Publish to OpenVSX Registry
        if: steps.vscode-published.outputs.published == 'true'
        working-directory: ./packages/coldark-vscode
        run: |
          pnpm dlx ovsx publish --no-dependencies -p ${{ secrets.OVSX_TOKEN }}
